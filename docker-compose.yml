services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cash_flow_manager}
      POSTGRES_USER: ${POSTGRES_USER:-cash_flow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cash_flow_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_ENGINE: postgresql
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      POSTGRES_DB: ${POSTGRES_DB:-cash_flow_manager}
      POSTGRES_USER: ${POSTGRES_USER:-cash_flow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cash_flow_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - venv:/app/.venv

volumes:
  postgres_data:
  venv:
