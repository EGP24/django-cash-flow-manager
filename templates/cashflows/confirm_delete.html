{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-7 col-xl-5">
      <h1 class="h3 mb-3">{{ title }}</h1>
      <form class="border rounded-2 p-3 bg-body" method="post">
        {% csrf_token %}
        <p>Подтвердите удаление: <strong>{{ object }}</strong></p>
        <div class="d-flex gap-2">
          <button class="btn btn-danger" type="submit">Удалить</button>
          <a class="btn btn-outline-secondary" href="{% url 'cashflows:transaction-list' %}">Отмена</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
